default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
  queue:
    <<: *default
    database: storage/development_queue.sqlite3
    migrations_paths: db/queue_migrate
  ingestion:
    <<: *default
    database: storage/development_ingestion.sqlite3
    migrations_paths: db/migrate_ingestion

test:
  primary:
    <<: *default
    database: storage/test.sqlite3
  queue:
    <<: *default
    database: storage/test_queue.sqlite3
    migrations_paths: db/queue_migrate
  ingestion:
    <<: *default
    database: storage/test_ingestion.sqlite3
    migrations_paths: db/migrate_ingestion

# TODO: make DB paths easily configurable based upon deploy
production:
  primary:
    <<: *default
    database: <%= ENV["DB_STORAGE_PATH"] %>/production.sqlite3
  queue:
    <<: *default
    database: <%= ENV["DB_STORAGE_PATH"] %>/production_queue.sqlite3
    migrations_paths: db/queue_migrate
  ingestion:
    <<: *default
    database: <%= ENV["DB_STORAGE_PATH"] %>/production_ingestion.sqlite3
    migrations_paths: db/migrate_ingestion
